<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" role="img" aria-hidden="true" preserveAspectRatio="xMidYMid slice">
  <defs>
    <radialGradient id="ha-bg" cx="50%" cy="45%" r="75%">
      <stop offset="0%" stop-color="#1a1815"/>
      <stop offset="55%" stop-color="#0f0e0c"/>
      <stop offset="100%" stop-color="#050403"/>
    </radialGradient>
    <linearGradient id="ha-gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#d9bd8a" stop-opacity="0.9"/>
      <stop offset="55%" stop-color="#b8945a" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#94743f" stop-opacity="0.6"/>
    </linearGradient>
    <radialGradient id="ha-halo" cx="50%" cy="45%" r="45%">
      <stop offset="0%" stop-color="#d9bd8a" stop-opacity="0.14"/>
      <stop offset="60%" stop-color="#b8945a" stop-opacity="0.05"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </radialGradient>
    <filter id="ha-blur" x="-10%" y="-10%" width="120%" height="120%">
      <feGaussianBlur stdDeviation="1.2"/>
    </filter>
    <filter id="ha-soft" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <!-- Fond -->
  <rect width="800" height="1000" fill="url(#ha-bg)"/>
  <ellipse cx="400" cy="440" rx="360" ry="360" fill="url(#ha-halo)"/>

  <!-- Poussière dorée (petits points) -->
  <g fill="#d9bd8a" opacity="0.55">
    <circle cx="120" cy="120" r="0.7"/>
    <circle cx="680" cy="180" r="0.5"/>
    <circle cx="240" cy="900" r="0.6"/>
    <circle cx="620" cy="820" r="0.7"/>
    <circle cx="90" cy="500" r="0.5"/>
    <circle cx="720" cy="560" r="0.6"/>
    <circle cx="360" cy="70" r="0.4"/>
    <circle cx="500" cy="960" r="0.5"/>
    <circle cx="180" cy="720" r="0.6"/>
    <circle cx="640" cy="330" r="0.4"/>
    <circle cx="290" cy="410" r="0.5"/>
    <circle cx="520" cy="640" r="0.4"/>
  </g>

  <!-- Bulles-émulsion (grande composition centrale) -->
  <g stroke="url(#ha-gold)" fill="none" filter="url(#ha-blur)">
    <circle cx="400" cy="440" r="220" stroke-width="0.6" opacity="0.35"/>
    <circle cx="400" cy="440" r="180" stroke-width="0.4" opacity="0.25"/>
    <circle cx="400" cy="440" r="140" stroke-width="0.3" opacity="0.18"/>
  </g>

  <!-- Bulles individuelles -->
  <g stroke="url(#ha-gold)" fill="none" opacity="0.75">
    <circle cx="270" cy="330" r="28" stroke-width="0.8"/>
    <circle cx="300" cy="290" r="10" stroke-width="0.6"/>
    <circle cx="238" cy="380" r="5" stroke-width="0.5"/>

    <circle cx="530" cy="360" r="22" stroke-width="0.7"/>
    <circle cx="558" cy="330" r="8" stroke-width="0.5"/>
    <circle cx="568" cy="370" r="4" stroke-width="0.5"/>

    <circle cx="330" cy="560" r="18" stroke-width="0.6"/>
    <circle cx="360" cy="600" r="6" stroke-width="0.5"/>

    <circle cx="490" cy="580" r="26" stroke-width="0.8"/>
    <circle cx="520" cy="620" r="10" stroke-width="0.6"/>
    <circle cx="465" cy="618" r="5" stroke-width="0.5"/>
  </g>

  <!-- Reflets subtils (ombrage doré interne) -->
  <g fill="url(#ha-gold)" opacity="0.35" filter="url(#ha-soft)">
    <ellipse cx="262" cy="322" rx="6" ry="2"/>
    <ellipse cx="522" cy="352" rx="5" ry="1.8"/>
    <ellipse cx="322" cy="552" rx="4" ry="1.6"/>
    <ellipse cx="482" cy="572" rx="6" ry="2"/>
  </g>

  <!-- Filet doré vertical central (repère de composition) -->
  <line x1="400" y1="80" x2="400" y2="180" stroke="url(#ha-gold)" stroke-width="0.4" opacity="0.35"/>
  <line x1="400" y1="820" x2="400" y2="920" stroke="url(#ha-gold)" stroke-width="0.4" opacity="0.35"/>

  <!-- Losange or centré discret (marque maison) -->
  <g transform="translate(400,120)" fill="none" stroke="url(#ha-gold)" stroke-width="0.5" opacity="0.55">
    <polygon points="0,-8 6,0 0,8 -6,0"/>
    <polygon points="0,-14 10,0 0,14 -10,0" opacity="0.4"/>
  </g>
  <g transform="translate(400,880)" fill="none" stroke="url(#ha-gold)" stroke-width="0.5" opacity="0.55">
    <polygon points="0,-8 6,0 0,8 -6,0"/>
    <polygon points="0,-14 10,0 0,14 -10,0" opacity="0.4"/>
  </g>

  <!-- Mention typographique discrète -->
  <g font-family="'Cormorant Garamond', Georgia, serif" fill="#d9bd8a" opacity="0.35" text-anchor="middle">
    <text x="400" y="720" font-size="16" font-style="italic" letter-spacing="0.5">— une émulsion —</text>
  </g>
</svg>
